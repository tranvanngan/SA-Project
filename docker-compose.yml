version: '3.8'

# ============================================================
# Food Delivery System - Docker Compose
# UEH - Môn Kiến trúc Phần mềm hướng dịch vụ
#
# Kiến trúc: Microservices + Event-Driven (RabbitMQ)
# Entry point duy nhất: API Gateway nginx (port 8080)
# ============================================================

services:

  # ---- Message Broker ----
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5673:5672"     # port cho service kết nối
      - "15673:15672"   # giao diện quản lý web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Order Service (port 9001, internal 8000) ----
  order-service:
    build:
      context: ./order_service
    container_name: order-service
    ports:
      - "9001:8000"   # expose trực tiếp để dev dùng Swagger
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./order_service:/app

  # ---- Payment Service (port 9002, internal 8000) ----
  payment-service:
    build:
      context: ./payment_service
    container_name: payment-service
    ports:
      - "9002:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./payment_service:/app

  # ---- Delivery Service (port 9003, internal 8000) ----
  delivery-service:
    build:
      context: ./delivery_service
    container_name: delivery-service
    ports:
      - "9003:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./delivery_service:/app

  # ---- API Gateway — nginx (port 8080) ----
  # Client chỉ cần gọi qua đây, không cần biết service nào ở port nào
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./api_gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - order-service
      - payment-service
      - delivery-service
