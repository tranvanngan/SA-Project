# ============================================================
# API Gateway — nginx
# Một entry point duy nhất cho toàn bộ hệ thống (port 8080)
# Fix Lỗi 4: Swagger hoạt động qua gateway nhờ proxy openapi.json + static assets
# ============================================================

events {
    worker_connections 1024;
}

http {

    # ---- Logging ----
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ---- Upstream — các microservice backend ----
    upstream order_service {
        server order-service:8000;
    }

    upstream payment_service {
        server payment-service:8000;
    }

    upstream delivery_service {
        server delivery-service:8000;
    }

    server {
        listen 8080;

        # ================================================================
        # API Routes
        # ================================================================

        # /api/orders/**   → Order Service
        location /api/orders {
            rewrite ^/api/orders(/.*)?$ /orders$1 break;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # /api/payments/** → Payment Service
        location /api/payments {
            rewrite ^/api/payments(/.*)?$ /payments$1 break;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # /api/deliveries/** → Delivery Service
        location /api/deliveries {
            rewrite ^/api/deliveries(/.*)?$ /deliveries$1 break;
            proxy_pass http://delivery_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # /api/drivers → Delivery Service
        location /api/drivers {
            rewrite ^/api/drivers(/.*)?$ /drivers$1 break;
            proxy_pass http://delivery_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ================================================================
        # Swagger UI — Fix Lỗi 4
        # FastAPI Swagger cần: /docs, /openapi.json, /static/swagger-ui/*
        # Mỗi service cần proxy đầy đủ cả 3 nhóm path này
        # ================================================================

        # --- Order Service Swagger ---
        location /docs/orders {
            rewrite ^/docs/orders$ /docs break;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
        }
        location /openapi/orders.json {
            rewrite ^/openapi/orders.json$ /openapi.json break;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
        }

        # --- Payment Service Swagger ---
        location /docs/payments {
            rewrite ^/docs/payments$ /docs break;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
        }
        location /openapi/payments.json {
            rewrite ^/openapi/payments.json$ /openapi.json break;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
        }

        # --- Delivery Service Swagger ---
        location /docs/deliveries {
            rewrite ^/docs/deliveries$ /docs break;
            proxy_pass http://delivery_service;
            proxy_set_header Host $host;
        }
        location /openapi/deliveries.json {
            rewrite ^/openapi/deliveries.json$ /openapi.json break;
            proxy_pass http://delivery_service;
            proxy_set_header Host $host;
        }

        # --- Swagger static assets (dùng chung cho tất cả service) ---
        # FastAPI tự serve /static/swagger-ui/* nên chỉ cần proxy một lần qua order_service
        location /static/ {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
        }

        # ================================================================
        # Health check của gateway
        # ================================================================
        location /health {
            return 200 '{"status": "API Gateway running", "services": ["order", "payment", "delivery"]}';
            add_header Content-Type application/json;
        }
    }
}
